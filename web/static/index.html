<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belief-Aware LLM</title>
    <meta name="description" content="Interactive dashboard for the Belief-Aware LLM system — manage beliefs, query the AI, and inspect revision logs.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <!-- ─── Top Bar ──────────────────────────────────────────── -->
    <header class="topbar">
        <div class="topbar-left">
            <div class="logo">
                <span class="logo-icon">◈</span>
                <h1>Belief-Aware LLM</h1>
            </div>
            <span class="domain-badge">Loan Domain</span>
        </div>
        <div class="topbar-actions">
            <button id="btn-resolve" class="btn btn-secondary" title="Resolve dirty beliefs">
                <span class="btn-icon">⟳</span> Resolve
            </button>
            <button id="btn-reset" class="btn btn-danger" title="Reset the store">
                <span class="btn-icon">✕</span> Reset
            </button>
        </div>
    </header>

    <!-- ─── Main Layout ──────────────────────────────────────── -->
    <main class="layout">

        <!-- LEFT: Beliefs Panel -->
        <section class="panel panel-beliefs" id="panel-beliefs">
            <div class="panel-header">
                <h2>Belief Store</h2>
                <span class="belief-count" id="belief-count">0</span>
            </div>

            <div class="add-belief-form">
                <input type="text" id="input-key" placeholder="entity.attribute" spellcheck="false">
                <input type="text" id="input-value" placeholder="value" spellcheck="false">
                <button id="btn-add" class="btn btn-primary btn-sm" title="Add hypothesis">+</button>
            </div>

            <div class="beliefs-list" id="beliefs-list">
                <div class="empty-state">No beliefs yet. Add one above or use the presets.</div>
            </div>

            <div class="panel-footer">
                <button id="btn-load-preset" class="btn btn-ghost btn-sm">Load Loan Preset</button>
            </div>
        </section>

        <!-- CENTER: Chat Panel -->
        <section class="panel panel-chat" id="panel-chat">
            <div class="panel-header">
                <h2>Chat</h2>
                <div class="dirty-indicator" id="dirty-indicator" style="display:none">
                    <span class="dirty-dot"></span> Dirty beliefs pending
                </div>
            </div>

            <div class="chat-messages" id="chat-messages">
                <div class="chat-welcome">
                    <div class="chat-welcome-icon">◈</div>
                    <p>Ask a question about the current belief state.</p>
                    <p class="chat-welcome-sub">The LLM will reason over clean, resolved beliefs.</p>
                </div>
            </div>

            <form class="chat-input-area" id="chat-form">
                <textarea id="chat-input" placeholder="[ENTITY]&#10;applicant, loan&#10;&#10;[NEW BELIEF]&#10;applicant.income = 8000&#10;&#10;[QUERY]&#10;Is this applicant eligible?" rows="5" spellcheck="false"></textarea>
                <button type="submit" class="btn btn-primary" id="btn-send">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M22 2L11 13"/><path d="M22 2L15 22L11 13L2 9L22 2Z"/></svg>
                </button>
            </form>
        </section>

        <!-- RIGHT: Revision Log Panel -->
        <section class="panel panel-log" id="panel-log">
            <div class="panel-header">
                <h2>Revision Log</h2>
                <span class="log-count" id="log-count">0</span>
            </div>
            <div class="log-entries" id="log-entries">
                <div class="empty-state">No revisions yet.</div>
            </div>
        </section>

    </main>

    <script src="/static/app.js"></script>
</body>
</html>
